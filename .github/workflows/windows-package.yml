name: Windows Package

on:
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag to publish, for example v0.1.0'
        required: true
        type: string
      ref:
        description: 'Git ref to build, defaults to the selected branch or tag'
        required: false
        type: string

permissions:
  contents: write

env:
  CSC_IDENTITY_AUTO_DISCOVERY: 'false'
  ELECTRON_BUILDER_CACHE: ${{ github.workspace }}/.cache/electron-builder
  ELECTRON_CACHE: ${{ github.workspace }}/.cache/electron

jobs:
  resolve:
    name: Resolve Build Ref
    runs-on: ubuntu-latest
    outputs:
      ref: ${{ steps.resolve.outputs.ref }}
      tag: ${{ steps.resolve.outputs.tag }}
      artifact_suffix: ${{ steps.resolve.outputs.artifact_suffix }}
      target_commitish: ${{ steps.resolve.outputs.target_commitish }}
    steps:
      - name: Resolve ref
        id: resolve
        shell: bash
        run: |
          if [ -n "${{ inputs.ref }}" ]; then
            selected_ref="${{ inputs.ref }}"
          else
            selected_ref="${GITHUB_REF}"
          fi

          tag_name="${{ inputs.tag }}"
          artifact_suffix="${tag_name//\//-}"
          artifact_suffix="${artifact_suffix//:/-}"
          target_commitish="${selected_ref#refs/heads/}"
          target_commitish="${target_commitish#refs/tags/}"

          echo "ref=${selected_ref}" >> "$GITHUB_OUTPUT"
          echo "tag=${tag_name}" >> "$GITHUB_OUTPUT"
          echo "artifact_suffix=${artifact_suffix}" >> "$GITHUB_OUTPUT"
          echo "target_commitish=${target_commitish}" >> "$GITHUB_OUTPUT"

  package:
    name: Build Windows Installer
    needs: resolve
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.resolve.outputs.ref }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.17.0'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm test

      - name: Build renderer and main process
        shell: bash
        run: |
          npm run build:main
          npx vite build

      - name: Package Windows installer
        run: npx electron-builder --win --publish never

      - name: Upload packaged artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-package-${{ needs.resolve.outputs.artifact_suffix }}
          path: |
            release/*.exe
            release/*.blockmap
            release/latest*.yml
          if-no-files-found: error
          retention-days: 14

  publish:
    name: Publish Windows Release Asset
    needs:
      - resolve
      - package
    runs-on: ubuntu-latest
    steps:
      - name: Download packaged artifact
        uses: actions/download-artifact@v4
        with:
          name: windows-package-${{ needs.resolve.outputs.artifact_suffix }}
          path: release-artifacts

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.resolve.outputs.tag }}
          name: ${{ needs.resolve.outputs.tag }}
          target_commitish: ${{ needs.resolve.outputs.target_commitish }}
          draft: false
          prerelease: ${{ contains(needs.resolve.outputs.tag, '-') }}
          generate_release_notes: true
          files: |
            release-artifacts/**/*

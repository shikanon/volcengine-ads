name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag, for example v0.1.0"
        required: true
        type: string

permissions:
  contents: write

env:
  CSC_IDENTITY_AUTO_DISCOVERY: "false"
  ELECTRON_BUILDER_CACHE: ${{ github.workspace }}/.cache/electron-builder
  ELECTRON_CACHE: ${{ github.workspace }}/.cache/electron

jobs:
  build:
    name: Build ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: macOS
            os: macos-latest
            target: --mac
            artifact_name: macos
          - name: Windows
            os: windows-latest
            target: --win
            artifact_name: windows
          - name: Linux
            os: ubuntu-latest
            target: --linux
            artifact_name: linux

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20.17.0"
          cache: npm

      - name: Install Linux build dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libsecret-1-dev libarchive-tools

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm test

      - name: Build renderer and main process
        run: |
          npm run build:main
          npx vite build

      - name: Package installer
        run: npx electron-builder ${{ matrix.target }} --publish never

      - name: Upload packaged artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.artifact_name }}
          path: |
            release/*.AppImage
            release/*.blockmap
            release/*.dmg
            release/*.exe
            release/latest*.yml
          if-no-files-found: error
          retention-days: 14

  publish:
    name: Publish GitHub Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Resolve release tag
        id: release
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "tag=${{ inputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          fi

      - name: Download packaged artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: release-*
          path: release-artifacts
          merge-multiple: true

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.release.outputs.tag }}
          name: ${{ steps.release.outputs.tag }}
          draft: false
          prerelease: ${{ contains(steps.release.outputs.tag, '-') }}
          generate_release_notes: true
          files: |
            release-artifacts/**/*

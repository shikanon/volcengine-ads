name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag, for example v0.1.0'
        required: true
        type: string

permissions:
  contents: write

env:
  CSC_IDENTITY_AUTO_DISCOVERY: 'false'
  ELECTRON_BUILDER_CACHE: ${{ github.workspace }}/.cache/electron-builder
  ELECTRON_CACHE: ${{ github.workspace }}/.cache/electron

jobs:
  prepare:
    name: Resolve Release Tag
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.resolve.outputs.tag }}
      ref: ${{ steps.resolve.outputs.ref }}
    steps:
      - name: Resolve release tag
        id: resolve
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "tag=${{ inputs.tag }}" >> "$GITHUB_OUTPUT"
            echo "ref=refs/tags/${{ inputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
            echo "ref=${GITHUB_REF}" >> "$GITHUB_OUTPUT"
          fi

  build:
    needs: prepare
    name: Build ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: macOS
            os: macos-latest
            target: --mac
            artifact_name: macos
          - name: Windows
            os: windows-latest
            target: --win
            artifact_name: windows

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.prepare.outputs.ref }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.17.0'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm test

      - name: Build renderer and main process
        run: |
          npm run build:main
          npx vite build

      - name: Package installer
        run: npx electron-builder ${{ matrix.target }} --publish never

      - name: Upload packaged artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ needs.prepare.outputs.tag }}-${{ matrix.artifact_name }}
          path: |
            release/*.blockmap
            release/*.dmg
            release/*.exe
            release/latest*.yml
          if-no-files-found: error
          retention-days: 14

  publish:
    name: Publish GitHub Release
    needs:
      - prepare
      - build
    runs-on: ubuntu-latest
    steps:
      - name: Download packaged artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: release-${{ needs.prepare.outputs.tag }}-*
          path: release-artifacts
          merge-multiple: true

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.prepare.outputs.tag }}
          name: ${{ needs.prepare.outputs.tag }}
          draft: false
          prerelease: ${{ contains(needs.prepare.outputs.tag, '-') }}
          generate_release_notes: true
          files: |
            release-artifacts/**/*
